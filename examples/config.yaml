# Example ~/.whiz/config.yaml

profiles:
  # OpenRouter free tier (default)
  or-free:
    backend: openrouter
    model: openrouter/qwen/qwen-2.5-7b-instruct:free
    sub_model: openrouter/qwen/qwen-2.5-7b-instruct:free
    recursion:
      max_depth: 3
      max_repl_rounds: 50
    environment: local

  # Specific models via OpenRouter
  or-claude:
    backend: openrouter
    model: openrouter/anthropic/claude-sonnet-4
    sub_model: openrouter/anthropic/claude-sonnet-4
    recursion:
      max_depth: 5
      max_repl_rounds: 100
    environment: local

  or-gpt4o:
    backend: openrouter
    model: openrouter/openai/gpt-4o
    sub_model: openrouter/openai/gpt-4o
    recursion:
      max_depth: 5
      max_repl_rounds: 100
    environment: local

  # Let OpenRouter auto-select
  or-auto:
    backend: openrouter
    model: openrouter/auto
    sub_model: openrouter/auto
    recursion:
      max_depth: 5
      max_repl_rounds: 100
    environment: local

  # Local Ollama (uncomment if running Ollama)
  # ollama:
  #   backend: ollama
  #   model: llama3
  #   sub_model: ollama/llama3
  #   recursion:
  #     max_depth: 3
  #     max_repl_rounds: 50
  #   environment: local

# Active profile (override with --profile flag)
active_profile: or-free

logging:
  dir: ~/.whiz/logs
  level: info
